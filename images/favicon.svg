<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="10" fill="#1a1a1a"/>
  <!-- Dossier haut (têtière) -->
  <rect x="20" y="10" width="24" height="10" rx="3" fill="#e85d2a"/>
  <!-- Dossier principal -->
  <rect x="16" y="18" width="32" height="22" rx="4" fill="#e85d2a"/>
  <!-- Bandes lombaires -->
  <rect x="20" y="22" width="24" height="2" fill="#1a1a1a" opacity=".35"/>
  <rect x="20" y="28" width="24" height="2" fill="#1a1a1a" opacity=".35"/>
  <!-- Assise -->
  <rect x="12" y="40" width="40" height="8" rx="2" fill="#c64a1d"/>
  <!-- Pied vertical -->
  <rect x="30" y="48" width="4" height="8" fill="#4a4a4a"/>
  <!-- Base étoile -->
  <rect x="18" y="55" width="28" height="4" rx="2" fill="#4a4a4a"/>
</svg>
